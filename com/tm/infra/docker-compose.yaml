# Local dev infra for the booking system: Redis (claim gate + pending set),
# Kafka (claim event hand-off), Postgres (source of truth + backstop),
# Prometheus (scrapes server/manager /metrics), Grafana (dashboards).
#
# Usage: see ../../../Makefile (`make infra-up`, `make server`, `make manager`).
services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory", "2gb", "--maxmemory-policy", "noeviction"]
    ports: ["6379:6379"]
    deploy:
      resources:
        limits:
          cpus: "1.0"

  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # PLAINTEXT: host clients (load-gen, loadtest); INTERNAL: other containers
      # on the compose network (server/manager use kafka:9094).
      KAFKA_LISTENERS: "PLAINTEXT://:9092,INTERNAL://:9094,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092,INTERNAL://kafka:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      # More partitions → diverse/ramp workloads spread across partitions and
      # scale linearly. Single hot-opp (gate test) still bottlenecks on 1
      # partition by design (key=opp_id → same partition always).
      KAFKA_NUM_PARTITIONS: "12"
      KAFKA_NUM_NETWORK_THREADS: "4"
      KAFKA_NUM_IO_THREADS: "8"
      # Rely on OS page-cache for durability (single-node dev env, no replication).
      KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: "100000"
      KAFKA_LOG_FLUSH_INTERVAL_MS: "5000"
    ports: ["9092:9092"]

  postgres:
    image: postgres:16-alpine
    # Tuned for the manager settle path: 200-500 autocommit CTE batches/sec.
    command:
      - "-c"
      - "max_connections=300"
      # Biggest single-node lever: don't block each commit on WAL fsync. A crash
      # can lose the last few ms of commits, but bookings insert + remaining
      # decrement live in the SAME txn so they revert together (no oversell), and
      # the Redis pending-set + reconciliation replay them (at-least-once + UNIQUE).
      - "-c"
      - "synchronous_commit=off"
      # Group commits within a 200us window so concurrent settles share WAL flushes.
      - "-c"
      - "commit_delay=200"
      - "-c"
      - "commit_siblings=5"
      # More cache for the hot opportunities/bookings pages (25% of the 2g limit).
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=1536MB"
      # Fewer/cheaper checkpoints under sustained writes.
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
    environment:
      POSTGRES_DB: earlybird
      POSTGRES_USER: earlybird
      POSTGRES_PASSWORD: earlybird
    ports: ["5432:5432"]
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2g

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    ports: ["3000:3000"]
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]

  # Load-test images (Bazel-built, profile "loadtest"); not pulled from registry.
  loadtest-redis-counter:
    image: early-bird/loadtest-redis-counter:latest
    pull_policy: never
    profiles: ["loadtest"]
    depends_on: [redis]
    ports: ["9410:9410"]
    environment:
      REDIS_ADDR: "redis:6379"
    command:
      - "--redis=redis:6379"
      - "--metrics-addr=:9410"
      - "--run=all"
      - "--pool=500"
      - "--gate-requests=10000000"
      - "--capacity=1000000"
      - "--dup-n=5000"
      - "--gate-rps=20000"

  loadtest-pg:
    image: early-bird/loadtest-pg:latest
    pull_policy: never
    profiles: ["loadtest"]
    depends_on: [postgres]
    ports: ["9411:9411"]
    environment:
      PG_DSN: "postgres://earlybird:earlybird@postgres:5432/earlybird?sslmode=disable"
    command:
      - "--pg=postgres://earlybird:earlybird@postgres:5432/earlybird?sslmode=disable"
      - "--metrics-addr=:9411"
      - "--run=ramp"
      - "--ramp-start-rate=100"
      - "--ramp-step-size=50"
      - "--ramp-steps=5"
      - "--ramp-step-dur=2m"
      - "--ramp-cooldown=15s"

  loadtest-server:
    image: early-bird/loadtest-server:latest
    pull_policy: never
    profiles: ["loadtest"]
    depends_on: [server]
    ports: ["9412:9412"]
    command:
      - "--server=http://server:8080"
      - "--metrics-addr=:9412"
      - "--run=ramp"
      - "--ramp-step=2m"
      - "--ramp-cooldown=15s"

  # Bazel-built images (see `make server` / `make manager`); not pulled.
  server:
    image: early-bird/server:latest
    pull_policy: never
    profiles: ["app"]
    depends_on: [redis, kafka, postgres]
    ports: ["8080:8080", "9404:9404"]
    environment:
      REDIS_URI: "redis://redis:6379"
      KAFKA_BROKERS: "kafka:9094"
      JDBC_URL: "jdbc:postgresql://postgres:5432/earlybird"
      DISABLE_CIRCUIT_BREAKER: "${DISABLE_CIRCUIT_BREAKER:-false}"

  manager:
    image: early-bird/manager:latest
    pull_policy: never
    profiles: ["app"]
    depends_on: [redis, kafka, postgres]
    ports: ["9405:9404"]
    environment:
      REDIS_URI: "redis://redis:6379"
      KAFKA_BROKERS: "kafka:9094"
      JDBC_URL: "jdbc:postgresql://postgres:5432/earlybird"
      MAX_POLL_RECORDS: "${MAX_POLL_RECORDS:-2000}"
      SETTLE_BATCH_SIZE: "${SETTLE_BATCH_SIZE:-200}"
      DB_POOL_SIZE: "${DB_POOL_SIZE:-16}"
